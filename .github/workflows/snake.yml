name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: Eric-huang799
          outputs: |
            snk/github-contribution-grid-snake.svg
            snk/github-contribution-grid-snake-dark.svg?palette=github-dark
      - name: Push snk to main
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add snk/
          git diff --staged --quiet || git commit -m "Update snake animation"
          git push
